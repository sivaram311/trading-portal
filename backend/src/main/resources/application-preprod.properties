# Profile: preprod (F: :4340 → schema preprod)
server.port=4340
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/app_trading_portal?currentSchema=preprod
spring.datasource.username=app_trading_portal_preprod
spring.datasource.password=${TRADING_PORTAL_ROLE_PREPROD_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=preprod
spring.flyway.enabled=true
spring.flyway.schemas=preprod
spring.flyway.default-schema=preprod
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
trading.security.dev-bypass=false
trading.security.client-id=trading-portal
# css-next PREPROD IdP (side fleet); JWKS on :4910 → css-next-staging
trading.security.jwk-set-uri=http://127.0.0.1:4910/.well-known/jwks.json
trading.exec.live-enabled=false
trading.seed.enabled=true
