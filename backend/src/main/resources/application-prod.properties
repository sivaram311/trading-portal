# Profile: prod (G: :5340 → schema prod)
server.port=5340
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/app_trading_portal?currentSchema=prod
spring.datasource.username=app_trading_portal_prod
spring.datasource.password=${TRADING_PORTAL_ROLE_PROD_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=prod
spring.flyway.enabled=true
spring.flyway.schemas=prod
spring.flyway.default-schema=prod
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
trading.security.dev-bypass=false
trading.security.client-id=trading-portal
# css-next PROD IdP :5910 / issuer https://css-next.delena.buzz
trading.security.jwk-set-uri=http://127.0.0.1:5910/.well-known/jwks.json
trading.exec.live-enabled=false
trading.exec.broker=none
trading.exec.allowed-profiles=
trading.exec.mt5-allow-send=false
trading.seed.enabled=true
trading.paper.auto-confirm-a-plus=false
trading.ops.ingest-health-url=http://127.0.0.1:5342/health
trading.ops.ohlc-stale-after-seconds=7200
