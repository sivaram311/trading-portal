# DEV profile — E: drive / schema `dev` only (hard rule: E:->dev).
# Real credentials are NOT stored here. They are loaded from a gitignored local file below
# (classpath or working dir), falling back to environment variables.
# Copy application-local.properties.example -> application-local.properties.
spring.config.import=optional:classpath:/application-local.properties,optional:file:./application-local.properties

spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/app_trading_portal?currentSchema=dev
spring.datasource.username=${TRADING_PORTAL_ROLE_DEV:app_trading_portal_dev}
spring.datasource.password=${TRADING_PORTAL_ROLE_DEV_PASSWORD:}

# Flyway owns the schema (tables live in `dev`). Hibernate does not manage/validate DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=dev
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.schemas=dev
spring.flyway.default-schema=dev
# The `dev` schema is pre-created (owned by the DEV role) so baseline on first migrate.
# baseline-version=0 ensures V1 still runs on a pre-existing (baselined) schema.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# DEV auth: CSS JWKS is unreachable in this environment (see docs/OPS.md "Blockers").
# Enable the fixed-header bypass so engines/APIs are testable locally. ONLY meaningful when true.
# Grok DECISION-002 MUST-FIX: real CSS JWKS path for promote readiness
trading.security.dev-bypass=false

# P5 micro-live (DEV only). Defaults stay safe: live off, kill-switch engaged at runtime,
# broker=none until operator sets sim|mt5. To arm DEV: live-enabled=true, broker=sim,
# POST /api/ops/kill-switch {"engaged":false}, then POST /api/live/confirm.
# Never set live-enabled=true on preprod/prod profiles.
trading.exec.allowed-profiles=dev
trading.exec.broker=none
trading.exec.live-enabled=false
trading.exec.mt5-allow-send=false
