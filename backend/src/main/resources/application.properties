spring.application.name=trading-portal
server.port=3340

# --- HikariCP pool caps (shared Postgres :5432 is multi-tenant) ---
# INCIDENT 2026-07-16: default pool (10) x many backends saturated max_connections=100.
# Grok VERDICT=PROCEED: cap low-traffic internal apps. See agents/hires/INCIDENT-2026-07-16-pg-conns.md
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=30000

# JSON contract fidelity: schemas in docs/contracts/schemas/*.json use snake_case
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator (optional per hire brief) — health only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# --- Trading Portal engine / security flags (safe defaults) ---
# Live execution is HARD OFF; there is no live adapter wired. Do not enable without a new Grok GO.
trading.exec.live-enabled=false
# Confluence weight set version (frozen; bump on any weight change).
trading.confluence.weights-version=v1
# Seed synthetic XAUUSD bars when ohlc_candle is empty so engines produce decisions without MT5.
trading.seed.enabled=true
# A+ auto-confirm into PAPER_OPEN (default OFF — operator must confirm manually).
trading.paper.auto-confirm-a-plus=false
# News blackout windows (empty = no veto). Example absolute window:
# trading.news.blackouts[0].start=2026-07-16T13:25:00Z
# trading.news.blackouts[0].end=2026-07-16T14:00:00Z
# Recurring NY-local band (weekday optional — omit for every day):
# trading.news.blackouts[0].ny-start=08:25
# trading.news.blackouts[0].ny-end=08:35
# trading.news.blackouts[0].weekday=WEDNESDAY

# Security: DEV bypass is OFF by default. Real CSS JWKS validation is the default path.
trading.security.dev-bypass=false
trading.security.dev-token=dev-operator-token
trading.security.client-id=trading-portal

# CSS JWKS (used only when dev-bypass=false). CSS DEV IdP :9000.
trading.security.jwk-set-uri=http://127.0.0.1:9000/.well-known/jwks.json

logging.level.com.delena.tradingportal=INFO
